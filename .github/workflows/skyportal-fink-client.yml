name: skyportal-fink-client

on:
  pull_request:
  push:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: pytest -m "not integration" -v

  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      postgres:
        image: postgres
        env:
          POSTGRES_USER: skyportal
          POSTGRES_PASSWORD: anything
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}

      - name: Checkout SkyPortal
        uses: actions/checkout@v4
        with:
          repository: skyportal/skyportal
          path: skyportal

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build SkyPortal Docker images
        run: |
          cd skyportal
          make docker-local

      - name: Start SkyPortal services
        run: |
          cd skyportal
          # Map SkyPortal's Docker port 9000 to localhost:5000 used by tests
          SKYPORTAL_PORT=5000 docker compose up -d

      - name: Wait for SkyPortal to be ready
        run: |
          echo "Waiting for SkyPortal to become available..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:5000/api/sysinfo | grep -q "version"; then
              echo "SkyPortal is ready"
              break
            fi
            echo "Attempt $i/30..."
            sleep 10
          done

      - name: Initialize SkyPortal database
        run: |
          cd skyportal
          docker exec skyportal-web bash -c \
            'source /skyportal_env/bin/activate && FLAGS="--config=config.yaml" make db_create_tables'
          docker exec skyportal-web bash -c \
            'source /skyportal_env/bin/activate && FLAGS="--create_tables --config=config.yaml" make load_demo_data'

      - name: Extract SkyPortal token and write config
        run: |
          SKYPORTAL_TOKEN=$(docker exec skyportal-web cat .tokens.yaml \
            | grep "INITIAL_ADMIN:" | cut -d':' -f2 | tr -d ' ')

          if [ -z "$SKYPORTAL_TOKEN" ]; then
            echo "Failed to extract SkyPortal token"
            exit 1
          fi

          echo "Token extracted successfully"
          # Write token into config.yaml used by integration tests
          sed -i "s/skyportal_token:.*/skyportal_token: $SKYPORTAL_TOKEN/" config.yaml

      - name: Start Kafka services
        run: |
          cd tests
          docker compose up -d
          echo "Waiting for Kafka to be ready..."
          sleep 15

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate fake alerts
        run: PYTHONPATH=. python tests/produce_fake.py

      - name: Run integration tests
        run: PYTHONPATH=. pytest -m integration -v

      - name: Collect container logs
        if: always()
        run: |
          mkdir -p debug_logs
          docker logs skyportal-web > debug_logs/skyportal.log 2>&1 || true
          docker ps -a > debug_logs/containers_status.txt 2>&1 || true

      - name: Save debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs
          path: debug_logs/
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          cd skyportal && docker compose down -v || true
          cd tests && docker compose down -v || true
